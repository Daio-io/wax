name: Build Engine

on:
  pull_request:
    paths:
      - "engine/**"
      - "rust-toolchain.toml"
      - "scripts/install.sh"
      - "scripts/test-install.sh"
      - "scripts/test-homebrew-formula.rb"
      - "scripts/generate-pack-index.sh"
      - "scripts/test-generate-pack-index.sh"
      - "scripts/check-release-workflow.rb"
      - "scripts/render-wax-scan-fixture-report.sh"
      - "scripts/test-wax-scan-render-report.sh"
      - "scripts/fixtures/wax-scan/**"
      - "skills/wax-scan/**"
      - "tests/wax-scan-report-screenshot.spec.mjs"
      - "tests/goldens/**"
      - "package.json"
      - "playwright.config.mjs"
      - "homebrew/Formula/wax.rb"
      - ".github/workflows/release.yml"
      - ".github/workflows/build_engine.yml"
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - "rust-toolchain.toml"
      - "scripts/install.sh"
      - "scripts/test-install.sh"
      - "scripts/test-homebrew-formula.rb"
      - "scripts/generate-pack-index.sh"
      - "scripts/test-generate-pack-index.sh"
      - "scripts/check-release-workflow.rb"
      - "scripts/render-wax-scan-fixture-report.sh"
      - "scripts/test-wax-scan-render-report.sh"
      - "scripts/fixtures/wax-scan/**"
      - "skills/wax-scan/**"
      - "tests/wax-scan-report-screenshot.spec.mjs"
      - "tests/goldens/**"
      - "package.json"
      - "playwright.config.mjs"
      - "homebrew/Formula/wax.rb"
      - ".github/workflows/release.yml"
      - ".github/workflows/build_engine.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify engine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      - name: Report Rust toolchain
        run: |
          rustc --version --verbose
          cargo --version --verbose
          rustup show active-toolchain

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
          key: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml', 'engine/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test pack index generator
        run: ../scripts/test-generate-pack-index.sh

      - name: Test curl installer
        run: ../scripts/test-install.sh

      - name: Test Homebrew formula
        run: ruby ../scripts/test-homebrew-formula.rb

      - name: Check release workflow
        run: ruby ../scripts/check-release-workflow.rb

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install wax-scan report visual test dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      - name: Install Chromium for wax-scan report screenshots
        run: npx playwright install --with-deps chromium
        working-directory: ${{ github.workspace }}

      - name: Verify wax-scan report HTML contract
        run: ../scripts/test-wax-scan-render-report.sh

      - name: Verify wax-scan report screenshots
        run: npm run test:wax-scan-report
        working-directory: ${{ github.workspace }}

      - name: Upload wax-scan report visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wax-scan-report-visual-artifacts
          path: |
            .wax/out/report-screenshots
            .wax/out/playwright-report
            .wax/out/playwright-results
          if-no-files-found: warn

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run workspace tests and emit JUnit
        run: cargo nextest run --workspace --all-features --locked --profile ci

      - name: Run workspace doc tests
        run: cargo test --doc --workspace --all-features --locked

      - name: Check workspace rustdoc
        run: cargo doc --workspace --all-features --locked --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: engine/target/nextest/ci/junit.xml
