name: Wax Scan Report

on:
  pull_request:
    paths:
      - "skills/wax-scan/**"
      - "scripts/render-wax-scan-fixture-report.sh"
      - "scripts/test-wax-scan-render-report.sh"
      - "scripts/fixtures/wax-scan/**"
      - "tests/wax-scan-report-screenshot.spec.mjs"
      - "package.json"
      - "playwright.config.mjs"
      - ".github/workflows/wax_scan_report.yml"
  push:
    branches:
      - main
    paths:
      - "skills/wax-scan/**"
      - "scripts/render-wax-scan-fixture-report.sh"
      - "scripts/test-wax-scan-render-report.sh"
      - "scripts/fixtures/wax-scan/**"
      - "tests/wax-scan-report-screenshot.spec.mjs"
      - "package.json"
      - "playwright.config.mjs"
      - ".github/workflows/wax_scan_report.yml"

jobs:
  verify:
    name: Verify wax-scan report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright test harness
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check rendered HTML contract
        run: scripts/test-wax-scan-render-report.sh

      - name: Capture report screenshots
        run: npm run test:wax-scan-report

      - name: Upload report screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wax-scan-report-screenshots
          path: |
            .wax/out/report-screenshots
            .wax/out/playwright-report
            .wax/out/playwright-results
          if-no-files-found: warn
