name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to dry-run, for example v0.1.0-alpha.1"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  WAX_RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Validate release tag
        run: |
          set -euo pipefail
          version="${WAX_RELEASE_TAG#v}"
          if [[ "${version}" == "${WAX_RELEASE_TAG}" || -z "${version}" || "${version}" == */* ]]; then
            echo "release tag ${WAX_RELEASE_TAG} must look like v<version>" >&2
            exit 1
          fi
          echo "release version ${version}"

  verify:
    name: Verify engine
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read

    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test pack index generator
        run: ../scripts/test-generate-pack-index.sh

      - name: Run contract tests
        run: cargo test -p wax-contract

      - name: Run clippy
        run: cargo clippy -p wax-contract --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build release archives
        run: ./scripts/build-release.sh "${{ matrix.target }}"

      - name: Upload release assets
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.target }}
          path: |
            release/artifacts/${{ matrix.target }}/*.tar.gz
            release/artifacts/${{ matrix.target }}/*.tar.gz.sha256
          if-no-files-found: error

      - name: Upload release manifest
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ matrix.target }}
          path: release/artifacts/${{ matrix.target }}/manifest.json
          if-no-files-found: error

  smoke:
    name: Smoke downloaded host artifact
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download host release assets
        # actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          name: release-assets-x86_64-unknown-linux-gnu
          path: host-release-assets

      - name: Smoke wax version
        run: |
          set -euo pipefail
          archive="$(find host-release-assets -maxdepth 1 -name 'wax-[0-9]*-x86_64-unknown-linux-gnu.tar.gz' -print -quit)"
          test -n "$archive"
          checksum_file="${archive}.sha256"
          test -f "$checksum_file"
          (cd "$(dirname "$archive")" && shasum -a 256 -c "$(basename "$checksum_file")")
          mkdir -p smoke
          tar -xzf "$archive" -C smoke
          wax_bin="$(find smoke -type f -name wax -print -quit)"
          test -n "$wax_bin"
          version_output="$("$wax_bin" --version)"
          echo "$version_output"
          expected_version="${WAX_RELEASE_TAG#v}"
          if [[ "$version_output" != "wax ${expected_version}" ]]; then
            echo "wax --version output was '${version_output}', expected 'wax ${expected_version}'" >&2
            exit 1
          fi

  verify-release-assets:
    name: Verify release assets
    runs-on: ubuntu-latest
    needs:
      - build
      - smoke
    permissions:
      contents: read

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Download release assets
        # actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Download release manifests
        # actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          path: release-manifests
          pattern: release-manifest-*

      - name: Verify release asset set
        run: |
          set -euo pipefail
          version="${WAX_RELEASE_TAG#v}"
          for binary in wax wax-lang-compose wax-lang-basic wax-lang-react; do
            for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
              archive="release-assets/${binary}-${version}-${target}.tar.gz"
              checksum="${archive}.sha256"
              if [[ ! -f "$archive" ]]; then
                echo "missing expected release archive: $archive" >&2
                exit 1
              fi
              if [[ ! -f "$checksum" ]]; then
                echo "missing expected release checksum: $checksum" >&2
                exit 1
              fi
            done
          done
          archive_count="$(find release-assets -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')"
          checksum_count="$(find release-assets -maxdepth 1 -type f -name '*.tar.gz.sha256' | wc -l | tr -d ' ')"
          if [[ "$archive_count" != "16" || "$checksum_count" != "16" ]]; then
            echo "expected 16 archives and 16 checksums; found ${archive_count} archives and ${checksum_count} checksums" >&2
            find release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi
          (cd release-assets && shasum -a 256 -c ./*.tar.gz.sha256)

      - name: Generate pack index
        run: ./scripts/generate-pack-index.sh release-manifests release-assets/index.json

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Validate generated pack index
        env:
          WAX_EXPECTED_RELEASE_TAG: ${{ env.WAX_RELEASE_TAG }}
          WAX_PACK_INDEX_URL: file://${{ github.workspace }}/release-assets/index.json
        run: cd engine && cargo test -p wax-core validates_pack_index_from_env -- --ignored --nocapture

      - name: Report dry-run success
        if: github.event_name == 'workflow_dispatch'
        run: echo "release dry run passed for ${WAX_RELEASE_TAG}; skipping GitHub Release publish"

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: verify-release-assets
    permissions:
      contents: write

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Download release assets
        # actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Download release manifests
        # actions/download-artifact@v4
        uses: actions/download-artifact@v4
        with:
          path: release-manifests
          pattern: release-manifest-*

      - name: Generate pack index
        run: ./scripts/generate-pack-index.sh release-manifests release-assets/index.json

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Validate generated pack index
        env:
          WAX_EXPECTED_RELEASE_TAG: ${{ env.WAX_RELEASE_TAG }}
          WAX_PACK_INDEX_URL: file://${{ github.workspace }}/release-assets/index.json
        run: cd engine && cargo test -p wax-core validates_pack_index_from_env -- --ignored --nocapture

      - name: Publish release assets
        # softprops/action-gh-release@v2
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
            release-assets/index.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(env.WAX_RELEASE_TAG, '-') }}

      - name: Publish pack index to gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin refs/heads/gh-pages:refs/remotes/origin/gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            git -C gh-pages-worktree checkout --orphan gh-pages
            git -C gh-pages-worktree rm -rf . || true
          fi
          cp release-assets/index.json gh-pages-worktree/index.json
          git -C gh-pages-worktree add index.json
          if git -C gh-pages-worktree diff --cached --quiet; then
            echo "gh-pages index.json already current"
          else
            git -C gh-pages-worktree commit -m "chore: publish pack index for ${WAX_RELEASE_TAG}"
            git -C gh-pages-worktree push origin HEAD:gh-pages
          fi

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Stamp npm package version from release tag
        run: |
          set -euo pipefail
          package_file="packages/cli/package.json"
          tmp_package_json="$(mktemp)"
          WAX_RELEASE_TAG="${WAX_RELEASE_TAG}" node -e '
            const fs = require("node:fs");
            const packageFile = process.argv[1];
            const tempFile = process.argv[2];
            const pkg = JSON.parse(fs.readFileSync(packageFile, "utf8"));
            pkg.version = process.env.WAX_RELEASE_TAG.replace(/^v/, "");
            fs.writeFileSync(tempFile, `${JSON.stringify(pkg, null, 2)}\n`);
          ' "$package_file" "$tmp_package_json"
          mv "$tmp_package_json" "$package_file"
          stamped_version="$(node -p 'require("./packages/cli/package.json").version')"
          expected_version="${WAX_RELEASE_TAG#v}"
          if [[ "$stamped_version" != "$expected_version" ]]; then
            echo "packages/cli/package.json version ${stamped_version} does not match stamped release tag ${expected_version}" >&2
            exit 1
          fi

      - name: Publish package to npm
        working-directory: packages/cli
        run: |
          set -euo pipefail
          release_version="${WAX_RELEASE_TAG#v}"
          npm_tag=latest
          if [[ "$release_version" == *-* ]]; then
            npm_tag=alpha
          fi
          npm publish --access public --tag "$npm_tag"

  verify-published-pack-index:
    name: Verify published pack index
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: publish
    permissions:
      contents: read

    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Verify fetch_pack_index against default URL
        env:
          WAX_EXPECTED_RELEASE_TAG: ${{ env.WAX_RELEASE_TAG }}
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if cargo test -p wax-core fetches_published_default_pack_index -- --ignored --nocapture; then
              exit 0
            fi
            echo "published index not ready for ${WAX_EXPECTED_RELEASE_TAG}; retry ${attempt}/12"
            sleep 10
          done
          cargo test -p wax-core fetches_published_default_pack_index -- --ignored --nocapture
