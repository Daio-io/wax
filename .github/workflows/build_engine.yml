name: Build Engine

on:
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/build_engine.yml"
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - ".github/workflows/build_engine.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify engine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Install cargo2junit
        run: cargo install --locked cargo2junit

      - name: Run wax-contract tests and emit JUnit
        run: |
          set -o pipefail
          cargo test -p wax-contract -- --format json \
            | cargo2junit > target/junit-wax-contract.xml

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: engine/target/junit-wax-contract.xml

      - name: Run clippy
        run: cargo clippy -p wax-contract --all-targets -- -D warnings
